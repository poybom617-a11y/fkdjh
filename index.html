<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin:0;
  overflow:hidden;
}

/* 실제 이미지 */
.bg {
  width:100%;
  height:100vh;
  background:url('https://stimg.sooplive.com/NORMAL_BBS/4/29344534/957369d5478ab9564.png') center/cover;
}

/* 검정 덮개 */
.overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  pointer-events:none;
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="overlay" id="overlay"></div>

<script>
const overlay = document.getElementById('overlay');

document.addEventListener('mousemove', (e)=>{
  const x = e.clientX;
  const y = e.clientY;

  overlay.style.maskImage =
    `radial-gradient(circle 120px at ${x}px ${y}px, transparent 0%, black 100%)`;

  overlay.style.webkitMaskImage =
    `radial-gradient(circle 120px at ${x}px ${y}px, transparent 0%, black 100%)`;
});
</script>

</body>
</html>
