<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin:0;
  overflow:hidden;
}

/* 배경 이미지 */
.bg {
  width:100%;
  height:100vh;
  background:url('https://stimg.sooplive.com/NORMAL_BBS/4/29344534/957369d5478ab9564.png') center/cover no-repeat;
}

/* 검정 덮개 */
.overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  pointer-events:none;

  /* 기본은 아무것도 안 보이게 */
  -webkit-mask-image: radial-gradient(circle 0px at 50% 50%, transparent 0%, black 100%);
  mask-image: radial-gradient(circle 0px at 50% 50%, transparent 0%, black 100%);
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="overlay" id="overlay"></div>

<script>
const overlay = document.getElementById('overlay');

document.addEventListener('mousemove', (e)=>{
  const x = e.clientX;
  const y = e.clientY;

  const size = 120; // 🔥 원 크기

  const gradient = `radial-gradient(circle ${size}px at ${x}px ${y}px, transparent 0%, transparent 99%, black 100%)`;

  overlay.style.webkitMaskImage = gradient;
  overlay.style.maskImage = gradient;
});
</script>

</body>
</html>
