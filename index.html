<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin:0;
  overflow:hidden;
}

/* 배경 이미지 */
.bg {
  width:100%;
  height:100vh;
  background-image: url("https://stimg.sooplive.com/NORMAL_BBS/4/29344534/509469d55efa352bc.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* 검정 덮개 */
.overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  pointer-events:none;
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="overlay" id="overlay"></div>

<script>
const overlay = document.getElementById("overlay");

document.addEventListener("mousemove", function(e) {
  const x = e.clientX;
  const y = e.clientY;

  const size = 140;

  const gradient =
    "radial-gradient(circle " + size + "px at " + x + "px " + y + "px, transparent 0%, transparent 99%, black 100%)";

  overlay.style.webkitMaskImage = gradient;
  overlay.style.maskImage = gradient;
});
</script>

</body>
</html>
