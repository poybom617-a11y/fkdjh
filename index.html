<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin:0;
  overflow:hidden;
}

.bg {
  width:100%;
  height:100vh;
  background-image: url("https://stimg.sooplive.com/NORMAL_BBS/4/29344534/509469d55efa352bc.png?v=1");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  pointer-events:none;

  clip-path: circle(0px at 50% 50%);
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="overlay" id="overlay"></div>

<script>
const overlay = document.getElementById("overlay");

document.addEventListener("mousemove", function(e) {
  const x = e.clientX;
  const y = e.clientY;

  const size = 140;

  overlay.style.clipPath = `circle(${size}px at ${x}px ${y}px)`;
});
</script>

</body>
</html>
